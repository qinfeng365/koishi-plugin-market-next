name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Build and pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Audit package dependency tree
        run: npm run audit:package

      - name: Audit high severity full install
        run: npm run audit:high

      - name: Build
        run: npm run build

      - name: Check package contents
        run: npm run check:package
