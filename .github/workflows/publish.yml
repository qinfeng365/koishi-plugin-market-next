name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, must match package.json (for example: 3.4.1)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Check release version
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]]; then
              echo "Tag version (${TAG_VERSION}) does not match package.json version (${PACKAGE_VERSION})."
              exit 1
            fi
          else
            if [[ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]]; then
              echo "Manual publish must run from the default branch (${DEFAULT_BRANCH}), current ref is ${GITHUB_REF_NAME}."
              exit 1
            fi

            if [[ "${{ inputs.version }}" != "${PACKAGE_VERSION}" ]]; then
              echo "Input version (${{ inputs.version }}) does not match package.json version (${PACKAGE_VERSION})."
              exit 1
            fi
          fi

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm."
            exit 1
          fi

          DIST_TAG="$(node -p 'const version = require("./package.json").version; const match = version.match(/-([0-9A-Za-z]+)(?:[.-]|$)/); match ? match[1] : "latest"')"

          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "$GITHUB_ENV"
          echo "NPM_DIST_TAG=${DIST_TAG}" >> "$GITHUB_ENV"
          echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION} with npm dist-tag ${DIST_TAG}."

      - name: Install dependencies
        run: npm ci

      - name: Audit package dependency tree
        run: npm run audit:package

      - name: Audit high severity full install
        run: npm run audit:high

      - name: Build
        run: npm run build

      - name: Check package contents
        run: npm run check:package

      - name: Publish
        run: npm publish --tag "${NPM_DIST_TAG}"
