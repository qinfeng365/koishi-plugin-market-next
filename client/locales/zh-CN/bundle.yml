conflict:
  version: 版本冲突：当前项目中已安装的版本为 {current}，不满足插件包声明的版本范围 {range}。安装将覆盖此依赖！
  config: 配置冲突：此插件在包外部已有配置。默认在包内创建停用配置；勾选“移动”可将配置迁移进包内。
  sameGroup: 配置存在：此插件在包分组下已存在配置，将默认跳过配置创建，仅确保依赖安装。
  externalNote: 检测到根层级或其他分组仍有配置，默认只清理插件包分组下的副本，不卸载成员依赖。
