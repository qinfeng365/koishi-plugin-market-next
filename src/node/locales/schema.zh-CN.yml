registry:
  $description: 插件源设置
  endpoint: 插件的下载源。默认跟随当前项目的 npm config。
  timeout: 获取插件数据的超时时间。
  autoRoute: 当前下载源获取版本失败时自动尝试备用 npm 源。
  retry: 每个 npm 源获取版本失败后的重试次数。
  concurrency: 批量获取依赖版本时的最大并发数。

search:
  $description: 搜索设置
  endpoint: 用于搜索插件市场的网址。默认使用 t4wefan 镜像。
  timeout: 搜索插件市场的超时时间。
  proxyAgent: 用于搜索插件市场的代理。
  autoRoute: 当前市场源失败时自动尝试备用市场源。
  logLevel: 插件市场调试日志级别。silent 关闭日志，debug 输出最详细。

frontendMode: 前端显示模式。性能模式保持低动效；精致模式启用更细腻的动效和高级样式。
depsLayout: 依赖管理页布局。网格模式多列展示；列表模式单列宽卡片，信息更密集。
marketLayout: 插件市场页布局。网格模式多列卡片；列表模式单列紧凑行。
chatlunaTool: 启用 ChatLuna 插件市场查询工具。启用后，若当前 Koishi 同时安装了 ChatLuna，会注册只读工具 koishi_plugin_market_search。
