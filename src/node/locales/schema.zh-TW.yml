registry:
  $description: 外掛程式源設定
  endpoint: 外掛程式的下載源。默認跟隨當前項目的 npm config。
  timeout: 獲取外掛程式數據的超時時間。
  autoRoute: 目前下載源取得版本失敗時自動嘗試備用 npm 源。
  retry: 每個 npm 源取得版本失敗後的重試次數。
  concurrency: 批量取得依賴版本時的最大併發數。
search:
  $description: 搜尋設定
  endpoint: 用於搜尋外掛程式市場的網址。默認使用 t4wefan 鏡像。
  timeout: 搜尋外掛程式市場的超時時間。
  proxyAgent: 用於搜尋外掛程式市場的代理。
  autoRoute: 目前市場源失敗時自動嘗試備用市場源。
  logLevel: 外掛程式市場調試日誌級別。silent 關閉日誌，debug 輸出最詳細。
